<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic TM Investigator — Workflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F141A;--ink-2:#2A333E;--muted:#5E6976;--faint:#939DA8;
    --paper:#EAEDF0;--panel:#FFFFFF;--line:#D6DCE2;--line-2:#E8ECEF;
    --teal:#0B6E75;--teal-deep:#08525A;--teal-wash:#E2EFEF;
    --amber:#A9690C;--amber-wash:#F8EFDD;
    --violet:#5A4A9C;--violet-wash:#EEEBF8;
    --safe:#2C7A54;--safe-wash:#E3F1E9;
    --rust:#B23A2E;
    --navy:#16233B;--cyan:#3FB6C0;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --sans:'IBM Plex Sans',system-ui,sans-serif;--disp:'Space Grotesk',sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--teal);color:#fff}

  .top{background:var(--navy);color:#fff;padding:15px 26px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:30}
  .top .g{width:30px;height:30px;border:1.5px solid #3C5170;border-radius:8px;display:grid;place-items:center;background:#0E1A2E;flex:0 0 auto}
  .top .g i{width:7px;height:7px;background:var(--cyan);border-radius:50%;display:block}
  .top h1{font-family:var(--disp);font-weight:700;font-size:16px;margin:0}
  .top small{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#8FA6BE;display:block;margin-top:1px}
  .tools{margin-left:auto;display:flex;align-items:center;gap:10px}
  .walk{appearance:none;cursor:pointer;font-family:var(--mono);font-size:11px;background:#22355A;border:1px solid #3C5170;color:#CFE0EC;border-radius:8px;padding:7px 13px;display:inline-flex;align-items:center;gap:7px}
  .walk:hover{background:#2A4068;color:#fff}
  .walk:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .tip{font-family:var(--mono);font-size:10.5px;color:#8FA6BE}
  .tip b{color:var(--cyan);font-weight:500}
  @media(max-width:760px){.tip{display:none}}

  .wrap{max-width:1010px;margin:0 auto;padding:26px 26px 80px;transition:padding-right .28s ease}
  @media(min-width:1240px){body.open .wrap{padding-right:420px}}

  .flow{position:relative}
  .flow::before{content:"";position:absolute;left:23px;top:18px;bottom:40px;width:2px;background:var(--line)}
  @media(max-width:640px){.flow::before{left:17px}}

  .phase{position:relative;display:grid;grid-template-columns:48px 1fr;gap:16px;padding:0 0 12px}
  @media(max-width:640px){.phase{grid-template-columns:36px 1fr;gap:11px}}
  .marker{position:relative;z-index:2;padding-top:14px}
  .marker .n{width:48px;height:48px;border-radius:14px;background:var(--panel);border:2px solid var(--line);display:grid;place-items:center;font-family:var(--mono);font-size:13px;color:var(--muted);transition:all .25s}
  @media(max-width:640px){.marker .n{width:36px;height:36px;border-radius:11px;font-size:11px}}
  .phase.lit .marker .n{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 0 0 5px var(--teal-wash)}
  .phase.past .marker .n{background:var(--teal-wash);border-color:var(--teal);color:var(--teal-deep)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:box-shadow .2s,border-color .2s}
  .phase.lit .card{border-color:var(--teal);box-shadow:0 10px 30px -18px rgba(11,110,117,.5)}
  .card .hd{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;padding:14px 17px 0}
  .card .ttl{font-family:var(--disp);font-weight:600;font-size:16.5px;letter-spacing:-.01em}
  .card .who{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:5px}
  .who.eng{color:var(--teal-deep);background:var(--teal-wash)}
  .who.ai{color:var(--amber);background:var(--amber-wash)}
  .who.chk{color:var(--violet);background:var(--violet-wash)}
  .who.hum{color:var(--safe);background:var(--safe-wash)}

  .split{display:grid;grid-template-columns:250px 1fr;gap:0;align-items:stretch;margin-top:12px}
  @media(max-width:760px){.split{grid-template-columns:1fr}}
  .vis{background:linear-gradient(180deg,#F7F9FA,#FFF);border-right:1px solid var(--line-2);padding:10px 12px;display:grid;place-items:center}
  @media(max-width:760px){.vis{border-right:none;border-bottom:1px solid var(--line-2)}}
  .vis svg{width:100%;height:auto;max-height:126px;display:block}
  .side{padding:13px 17px 15px}

  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{appearance:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:7px 12px;color:var(--ink);transition:.14s;line-height:1.2}
  .chip:hover{border-color:var(--teal);background:#fff}
  .chip.on{border-color:var(--teal);background:#fff;box-shadow:0 0 0 3px var(--teal-wash)}
  .chip:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

  .pats{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line)}
  .pats .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);width:100%;margin-bottom:2px}
  .pat{appearance:none;cursor:pointer;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:6px 6px 4px;width:64px;transition:.14s}
  .pat:hover{border-color:var(--teal);background:#fff}
  .pat.on{border-color:var(--teal);background:#fff;box-shadow:0 0 0 3px var(--teal-wash)}
  .pat svg{width:100%;height:26px;display:block}
  .pat span{font-family:var(--mono);font-size:8.5px;color:var(--muted);display:block;text-align:center;margin-top:2px}
  .pat:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

  /* svg atoms */
  .nd{fill:#20344D}.nd.h{fill:var(--teal)}.nd.dim{fill:#B9C3CD}
  .ed{stroke:#95B9BE;stroke-width:1.3;fill:none}
  .ed.dim{stroke:#D3DBE1}
  .ed.h{stroke:var(--teal);stroke-width:2}
  .bx{fill:#fff;stroke:var(--line);stroke-width:1}
  .bx.t{stroke:#A9CFD1;fill:var(--teal-wash)}
  .bx.r{stroke:#E0BAB4;fill:#FBEDEA}
  .lbl{font-family:'IBM Plex Mono',monospace;font-size:7px;fill:var(--muted);letter-spacing:.03em}
  .lbl.t{fill:var(--teal-deep)}.lbl.r{fill:var(--rust)}.lbl.w{fill:#fff}
  .bar{fill:#E3E8ED}.bar.t{fill:var(--teal)}
  .arw{stroke:var(--teal);stroke-width:1.4;fill:none;marker-end:url(#am)}
  .dash{stroke:#C3CCD5;stroke-width:1;stroke-dasharray:2.5 2.5;fill:none}
  .flowdash{stroke:var(--teal);stroke-width:1.6;fill:none;stroke-dasharray:4 6;animation:mar 1.4s linear infinite}
  @keyframes mar{to{stroke-dashoffset:-20}}

  .loop{display:grid;grid-template-columns:48px 1fr;gap:16px;margin:-4px 0 10px}
  @media(max-width:640px){.loop{grid-template-columns:36px 1fr;gap:11px}}
  .lp{font-family:var(--mono);font-size:10.5px;color:var(--violet);background:var(--violet-wash);border:1px dashed #B9B0DC;border-radius:8px;padding:6px 12px;display:inline-flex;gap:8px}
  .end{display:grid;grid-template-columns:48px 1fr;gap:16px;margin-top:2px}
  @media(max-width:640px){.end{grid-template-columns:36px 1fr;gap:11px}}
  .end .cap{font-family:var(--mono);font-size:10.5px;color:var(--faint);padding-top:6px}

  /* drawer */
  .drawer{position:fixed;top:0;right:0;height:100%;width:410px;max-width:93vw;background:var(--panel);border-left:1px solid var(--line);box-shadow:-20px 0 50px -30px rgba(16,24,32,.4);transform:translateX(102%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column}
  body.open .drawer{transform:none}
  .dr-top{padding:19px 22px 14px;border-bottom:1px solid var(--line-2);position:relative;flex:0 0 auto}
  .dr-tag{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
  .dr-top h2{font-family:var(--disp);font-weight:600;font-size:19px;margin:0;line-height:1.2;padding-right:26px}
  .dr-x{position:absolute;top:15px;right:15px;appearance:none;background:none;border:none;cursor:pointer;color:var(--faint);padding:4px;border-radius:6px}
  .dr-x:hover{color:var(--ink);background:var(--paper)}
  .dr-x:focus-visible{outline:2px solid var(--teal)}
  .dr-body{padding:17px 22px 28px;overflow-y:auto;flex:1;font-size:13.5px;line-height:1.6;color:var(--ink-2)}
  .dr-body p{margin:0 0 12px}
  .dr-body b{color:var(--ink);font-weight:600}
  .dr-body ul{margin:0 0 12px;padding-left:17px}.dr-body li{margin-bottom:6px}
  .dr-body .kv{font-family:var(--mono);font-size:11.5px;background:var(--paper);border:1px solid var(--line-2);border-radius:8px;padding:11px 13px;margin:0 0 12px;line-height:1.65;white-space:pre-wrap;overflow-x:auto}
  .dr-body .kv em{font-style:normal;color:var(--teal-deep)}
  .src{display:inline-block;font-family:var(--mono);font-size:10.5px;color:var(--teal-deep);background:var(--teal-wash);border:1px solid #B7D6D7;border-radius:5px;padding:2px 8px}
  .dr-nav{padding:11px 22px;border-top:1px solid var(--line-2);display:flex;gap:8px;flex:0 0 auto}
  .nb{appearance:none;cursor:pointer;font-family:var(--mono);font-size:11px;background:var(--paper);border:1px solid var(--line);border-radius:7px;padding:7px 12px;color:var(--ink-2);flex:1}
  .nb:hover{border-color:var(--teal);color:var(--teal-deep)}
  .nb:focus-visible{outline:2px solid var(--teal);outline-offset:1px}
  .scrim{position:fixed;inset:0;background:rgba(16,24,32,.25);opacity:0;pointer-events:none;transition:opacity .28s;z-index:45}
  body.open .scrim{opacity:1;pointer-events:auto}
  @media(min-width:1240px){body.open .scrim{opacity:0;pointer-events:none}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;scroll-behavior:auto!important}}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute"><defs>
<marker id="am" markerWidth="6" markerHeight="6" refX="4.6" refY="2.2" orient="auto"><path d="M0,0 L4.6,2.2 L0,4.4 Z" fill="#0B6E75"/></marker>
<marker id="ag" markerWidth="6" markerHeight="6" refX="4.6" refY="2.2" orient="auto"><path d="M0,0 L4.6,2.2 L0,4.4 Z" fill="#95B9BE"/></marker>
</defs></svg>

<div class="top">
  <div class="g"><i></i></div>
  <div><h1>Agentic TM Investigator</h1><small>Workflow · alert to decision</small></div>
  <div class="tools">
    <span class="tip"><b>Click any term</b> for detail</span>
    <button class="walk" id="walk"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Walk the flow</button>
  </div>
</div>

<div class="wrap">
  <div class="flow" id="flow"></div>
  <div class="end"><div></div><div class="cap">↑ every step is logged, replayable, and traceable to a source paper</div></div>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" role="dialog" aria-label="Detail">
  <div class="dr-top">
    <div class="dr-tag" id="drTag"></div><h2 id="drTitle"></h2>
    <button class="dr-x" id="drX" aria-label="Close"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  </div>
  <div class="dr-body" id="drBody"></div>
  <div class="dr-nav"><button class="nb" id="drPrev">← Previous</button><button class="nb" id="drNext">Next →</button></div>
</aside>

  ${[["synthetic",6],["backtest",64],["shadow",122],["guarded",180]].map(([l,x],i)=>`
    <rect class="bx${i<2?' t':''}" x="${x}" y="44" width="52" height="26" rx="6"/>
    <text class="lbl${i<2?' t':''}" x="${x+7}" y="60">${l}</text>
    ${i<3?`<path class="arw" d="M${x+53},57 L${x+62},57"/>`:''}`).join('')}
  <text class="lbl" x="6" y="34">no live use until each gate passes</text>
  <path class="dash" d="M6,84 L232,84"/>
  <text class="lbl" x="6" y="98">metrics reported per typology &amp; segment</text>
</svg>`;

/* ---------- phases ---------- */
const PHASES=[
{n:"01",t:"Alert arrives",who:"eng",whoL:"intake",items:[
 ["Transaction list","Per-entity exports, usually Excel or CSV. Locale-dependent decimal marks, differing date patterns, merged headers, footer rows, mixed encodings.<p>Nothing is parsed ad hoc — every source enters through a contract in step 02.</p>","[P2] §5.2"],
 ["KYC / CDD","Customer type, industry, risk rating, ownership signals, onboarding notes, declared expected activity.<p>Becomes the <b>declared baseline</b> that observed behaviour is later measured against.</p>","[P3] §2.2c"],
 ["TM alerts","Triggering rules and scores, thresholds, alert window, and the transaction set that breached.<p>Those breaching transactions become the <b>anchor edges</b> of the case in step 05.</p>","[P3] §2.2a"],
 ["Relationships","Account and customer links, shared attributes such as address or contact data, ownership chains.<p>Become attribute-link edges in the graph.</p>","[P2] §5.12"],
 ["Screening","Sanctions, PEP and adverse-media results.<p>Carried with match confidence intact — never silently promoted to fact.</p>","[P3] §2.2"],
 ["Prior cases","Earlier alerts, dispositions and investigator notes, indexed as case memory.<p>Restricted to reviewed cases, so past error is not amplified by retrieval.</p>","[P3] §2.2e"]
]},
{n:"02",t:"Normalise",who:"eng",whoL:"engine",items:[
 ["Ingestion contract","A versioned spec per source — where Excel reality is absorbed in one place.<div class='kv'><em>format</em>       sheet, encoding\n<em>locale</em>       decimal mark, date pattern\n<em>header_map</em>   source column → canonical field\n<em>mandatory</em>    fields that must be present\n<em>row_gates</em>    parse, numeric, direction resolvable\n<em>file_gates</em>   rowcount, period coverage, dedup hash</div><p>A row either satisfies the contract or is <b>quarantined with a reject code</b>. Nothing is silently coerced.</p>","[P2] §5.2"],
 ["Canonical event","Every accepted row rewritten to one typed grain.<ul><li><b>Hashed event ID</b> — re-ingestion is idempotent</li><li><b>Dual amount</b> — original preserved, plus conversion with its rate reference</li><li><b>UTC timestamps</b>, source offset retained</li><li><b>Enums</b> for direction and channel; free text kept in raw fields</li><li><b>Lineage</b> to file, sheet, row on every field</li></ul>","[P2] §5.2 · [P3] R6"]
]},
{n:"03",t:"Resolve entities",who:"eng",whoL:"engine",items:[
 ["Entity resolution","Counterparty strings from different systems naming the same real party are merged before anything is graphed.<p>Three bands: auto-merge above the upper threshold, human queue in the middle, stay distinct below. Survivorship rules pick canonical attributes.</p><p>Every merge is logged and reversible.</p>","[P1] §2.1"]
]},
{n:"04",t:"Build the graph",who:"eng",whoL:"engine",items:[
 ["Knowledge graph","Nodes are accounts and banks; edges are transactions carrying amount and timestamp. Node metadata includes entity type and creation date.<div class='kv'><em>transfers_to</em>          one edge per canonical event\n<em>belongs_to</em>            account → institution\n<em>linked_by_attribute</em>   shared address, contact\n<em>owns</em>                  ownership chains from KYC</div><p>Laundering is a network phenomenon — invisible in a flat statement, legible in a graph.</p>","[P1] §2.1"]
]},
{n:"05",t:"Scope the case",who:"eng",whoL:"engine",items:[
 ["k-hop subgraph","The alerted edges are anchors. The extractor takes their k-hop neighbourhood — source and destination accounts, neighbouring transactions, associated banks.<p>k is tuned per rule family. Expansion caps keep the case legible; when a cap truncates, the truncation is <b>recorded and surfaced as missing evidence</b> rather than dropped silently.</p>","[P1] §2.1"]
]},
{n:"06",t:"Compute the facts",who:"eng",whoL:"engine",items:[
 ["Feature dossier","All arithmetic happens here, in code, before any model sees the case.<p>Each feature carries its formula reference and contributing event IDs — which is what lets the verifier later re-execute any figure the model cites.</p>","[P3] R6"],
 ["Three baselines","Every figure is framed against three reference points:<div class='kv'><em>vs own</em>        customer's trailing distribution\n<em>vs declared</em>   the KYC expected band\n<em>vs peer</em>       segment percentile</div><p>A number means nothing without an expectation to compare it to — and baselines rule benign explanations <b>in</b> as often as out.</p>","[P2] §5.4"]
]},
{n:"07",t:"Package for the AI",who:"eng",whoL:"engine",items:[
 ["Serialization","The subgraph becomes structured text: role-tagged entities, relations preserving direction, timestamps and values, in temporal order. No summarising.<div class='kv'>[<em>&lt;T0&gt;</em>]   <em>&lt;ACCT_A&gt;</em> transfers_to <em>&lt;ACCT_B&gt;</em>\n        (amount=<em>&lt;AMT&gt;</em> <em>&lt;CCY&gt;</em>, channel=<em>&lt;CH&gt;</em>)  ← ANCHOR\n[<em>&lt;T0+δ&gt;</em>] <em>&lt;ACCT_B&gt;</em> transfers_to <em>&lt;ACCT_C&gt;</em></div><p>Fixed template, fixed ordering — identical subgraphs always serialise identically, which is what makes caching and audit replay possible.</p>","[P1] §2.2"],
 ["Evidence bundle","Everything citable becomes an evidence item.<div class='kv'><em>evidence_id</em>     stable identifier\n<em>source_type</em>     policy | kyc | trigger | subgraph\n                | feature | prior_case\n<em>effective_ts</em>    version timestamp\n<em>acl_tag</em>         access-control label\n<em>canonical_text</em>  retrieval and citation form\n<em>structured</em>      typed fields for the verifier</div><p>Assembly: structured filters first (customer, window, rule, ACL), then semantic ranking. Per-type quotas, deduplication, latest policy versions only.</p><p><b>What is retrievable defines what the model can assert.</b></p>","[P3] §2.2, §3.2"],
 ["Privacy guard","Sensitive entities replaced with reversible tokens before any model call; the map stays inside the trust boundary.<p>Analysis runs masked → narrative unmasked for the investigator → re-masked before anything leaves for external review.</p>","[P2] §5.3"],
 ["Few-shot exemplars","The prompt carries serialised demonstrations of the canonical laundering topologies, each with an analyst-style rationale grounded in structure — <b>plus benign counter-examples</b>, so the model learns to distinguish rather than only to accuse.</p>","[P1] §2.3"],
 ["Routing","Not every alert needs the full pipeline. A lightweight scorer triages the queue; only ambiguous or high-risk alerts continue through agents, verification and counterfactuals.<p>Repair and counterfactual budgets are capped per alert.</p>","[P1] §4 · [P3] §7.5"]
],pats:true},
{n:"08",t:"Investigate",who:"ai",whoL:"AI",items:[
 ["Crime-type detector","Risk-indicator extraction plus tree-based ensembles over the computed features produce <b>ranked typologies with confidence scores</b>.<p>This is what sets the scope — the LLM does not choose its own.</p>","[P2] §5.4"],
 ["Planning agent","Reads the ranked typologies and spawns only the relevant specialists. Event-driven rather than hard-coded, so new typologies can be added without touching the rest.","[P2] §5.5"],
 ["Typology agents","One per candidate typology — transaction fraud, volume and velocity, country risk, textual content, geographic anomaly, account health, dispute patterns.<p>Each examines the bundle for its own pattern, gathering evidence <b>for and against</b>.</p>","[P2] §5.6"],
 ["External intelligence","Pulls negative news, sanctions alerts and regulatory advisories through standardised tool interfaces rather than bespoke integrations.","[P2] §5.7"],
 ["Triage writer","Fills the output contract. May assert only what it can cite from the bundle by evidence ID.<p>It writes; it never calculates.</p>","[P3] §3.3"]
]},
{n:"09",t:"Verify",who:"chk",whoL:"gates",items:[
 ["Output contract","Not an essay — a schema.<div class='kv'><em>disposition</em>      dismiss | monitor | escalate\n<em>confidence</em>       calibrated\n<em>typologies</em>       ranked\n<em>rationale</em>        each paragraph ≥1 citation\n<em>supporting</em>       evidence IDs\n<em>contradicting</em>    evidence IDs\n<em>missing</em>          what was sought, not found\n<em>next_actions</em>     RFI, wider lookback, related accounts\n<em>counterfactuals</em>  validated flip conditions</div><p>Absence of corroboration is decision-relevant, so <b>missing</b> is a required field.</p>","[P3] §2.3"],
 ["Provenance check","Every cited evidence ID must exist in the supplied bundle. Fabricated citations are rejected outright.","[P3] §3.3"],
 ["Consistency check","Every amount, date, ordering and threshold comparison in the rationale is checked against the structured fields of the cited item.","[P3] §3.3"],
 ["Repair loop","A failed check returns targeted feedback — cited ID absent, stated total conflicts with evidence — and triggers bounded regeneration.<p>The draft <b>cannot reach the investigator</b> until checks pass.</p>","[P3] §3.3"],
 ["Decision counterfactual","Minimal plausible edits within a budget: toggle a claimed key indicator, adjust a counterparty risk tier, narrow the window, remove one graph path.<p>Tests whether the stated drivers are <b>actually</b> decision-relevant.</p>","[P3] §3.4"],
 ["Evidence counterfactual","Remove a critical cited item and re-run. The model must stop citing it and adjust coherently.<p>The direct test against <b>decorative citations</b> — explanations that sound grounded but do not drive the decision.</p>","[P3] §3.4"],
 ["Agent-as-a-judge","A live validation agent scores each narrative for coherence, alignment with the typology agents' findings, and regulatory completeness before release.","[P2] §5.9, §8"]
]},
{n:"10",t:"Investigator decides",who:"hum",whoL:"human",items:[
 ["Sign-off","The system drafts. It never dismisses or escalates on its own. The investigator reviews, edits or overrides, and records the decision.","[P2] §9"],
 ["Feedback capture","Edits and overrides are captured structurally and fed into subsequent cycles rather than lost in a document.","[P2] §5.10"],
 ["Audit trail","Every retrieval, tool call, intermediate artifact, verifier result and counterfactual outcome is logged.<p>Any narrative can be reconstructed and re-verified after the fact.</p>","[P3] §7.2"]
]},
{n:"11",t:"Prove it before live use",who:"hum",whoL:"before live",items:[
 ["Metrics","Escalate precision, recall and PR-AUC; citation validity; evidence support; counterfactual flip rate and faithfulness; numerical and policy hallucination rates.<p>Reported per typology and per segment, never in aggregate.</p>","[P3] §5"],
 ["Protocol","Time-aware splits — train on earlier alerts, test on later ones. Case memory indexes training-period cases only, so retrieval cannot become a label channel.","[P3] §4.4"],
 ["Rollout","Synthetic benchmarks → historical backtest on adjudicated cases → shadow mode → guarded assist with mandatory sign-off.","[P3] §7.3"],
 ["The three papers","<b>[P1]</b> In-Context Learning of LLMs for Money Laundering Detection in Financial Graphs — Pirmorad, Vanguard · arXiv:2507.14785<br><span style='color:#5E6976'>graph representation, k-hop scoping, serialisation, few-shot typologies</span><p><b>[P2]</b> Co-Investigator AI — Naik et al. · arXiv:2509.08380<br><span style='color:#5E6976'>ingestion layer, privacy guard, crime-type detection, agent decomposition, judge agent</span></p><p><b>[P3]</b> Explainable AML Triage with LLMs — Torres, Cheng &amp; Hu · arXiv:2604.19755<br><span style='color:#5E6976'>evidence model, retrieval, output contract, verifier, counterfactuals</span></p><p>Key finding from [P3]: the LLM alone was the <b>weakest</b> method tested — below gradient boosting. The same LLM inside this evidence-constrained, verified loop was the <b>strongest</b>, beating rules, tabular and graph baselines.</p>","basis"]
]}
];

const PAT=[
 ["Fan-out","One source disperses to many recipients in a short window — a common way to obscure origin."],
 ["Fan-in","Many sources converge into one account."],
 ["Gather-scatter","Funds from multiple sources converge briefly, then disperse again — a classic layering tactic."],
 ["Scatter-gather","Funds disperse, then re-converge downstream."],
 ["Cycle","Funds return to their origin after passing through intermediaries."],
 ["Bipartite","Dense many-to-many activity, consistent with mule networks or coordinated bursts."],
 ["Stack","A layered chain of intermediaries, each passing funds onward."],
 ["Random","Irregular, low-structure flow — the hardest class to recognise reliably."]
];
function nds(l){return l.map(([x,y,h])=>`<circle class="nd${h?' h':''}" cx="${x}" cy="${y}" r="3.6"/>`).join('')}
function egs(l){return l.map(([a,b,c,d])=>`<path class="ed" d="M${a},${b} L${c},${d}"/>`).join('')}
const PSVG=[
 egs([[16,24,48,8],[16,24,48,20],[16,24,48,30],[16,24,48,42]])+nds([[16,24,1],[52,8],[52,20],[52,30],[52,42]]),
 egs([[20,8,52,24],[20,20,52,24],[20,30,52,24],[20,42,52,24]])+nds([[16,8],[16,20],[16,30],[16,42],[56,24,1]]),
 egs([[12,10,34,24],[12,24,34,24],[12,38,34,24],[38,24,60,10],[38,24,60,24],[38,24,60,38]])+nds([[8,10],[8,24],[8,38],[36,24,1],[64,10],[64,24],[64,38]]),
 egs([[12,24,34,10],[12,24,34,24],[12,24,34,38],[38,10,60,24],[38,24,60,24],[38,38,60,24]])+nds([[8,24,1],[36,10],[36,24],[36,38],[64,24,1]]),
 egs([[22,10,50,10],[54,14,54,34],[50,38,22,38],[18,34,18,14]])+nds([[18,10,1],[54,10],[54,38],[18,38]]),
 egs([[16,9,54,13],[16,9,54,29],[16,24,54,13],[16,24,54,40],[16,39,54,29],[16,39,54,40]])+nds([[16,9],[16,24],[16,39],[58,13],[58,29],[58,40]]),
 egs([[14,24,30,24],[34,24,50,24],[54,24,66,24]])+nds([[12,24,1],[32,24],[52,24],[68,24]]),
 egs([[14,12,36,28],[36,28,58,10],[36,28,26,42],[58,10,64,34]])+nds([[14,12],[36,28],[58,10],[26,42],[64,34]])
];

/* build */
const FLAT=[]; let html='';
PHASES.forEach((p,pi)=>{
  let chips='';
  p.items.forEach(it=>{
    const id=FLAT.length;
    FLAT.push({tag:`Step ${p.n} · ${p.t}`,title:it[0],body:it[1],src:it[2]});
    chips+=`<button class="chip" data-id="${id}">${it[0]}</button>`;
  });
  let pats='';
  if(p.pats){
    pats='<div class="pats"><span class="lbl" style="font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);width:100%;margin-bottom:2px">canonical topologies shown as demonstrations</span>';
    PAT.forEach((q,qi)=>{
      const id=FLAT.length;
      FLAT.push({tag:"Typology · demonstration",title:q[0],body:`<p>${q[1]}</p><p>Presented to the model as a serialised subgraph in the step 07 format, paired with an analyst-style rationale grounded in structure rather than surface statistics.</p>`,src:"[P1] §2.3"});
      pats+=`<button class="pat" data-id="${id}"><svg viewBox="0 0 76 48" aria-hidden="true">${PSVG[qi]}</svg><span>${q[0]}</span></button>`;
    });
    pats+='</div>';
  }
  html+=`<div class="phase" data-p="${pi}">
    <div class="marker"><div class="n">${p.n}</div></div>
    <div class="card">
      <div class="hd"><span class="ttl">${p.t}</span><span class="who ${p.who}">${p.whoL}</span></div>
      <div class="split">
        <div class="vis">${V[pi]}</div>
        <div class="side"><div class="chips">${chips}</div>${pats}</div>
      </div>
    </div>
  </div>`;
  if(p.n==="09") html+=`<div class="loop"><div></div><div><span class="lp">↺ fails a gate → back to step 08 with targeted feedback</span></div></div>`;
});
document.getElementById('flow').innerHTML=html;

/* drawer */
let cur=null;
const body=document.body;
function open(id){
  const d=FLAT[id]; if(!d)return; cur=id;
  document.querySelectorAll('.chip,.pat').forEach(e=>e.classList.toggle('on',+e.dataset.id===id));
  document.getElementById('drTag').textContent=d.tag;
  document.getElementById('drTitle').textContent=d.title;
  document.getElementById('drBody').innerHTML=`<p>${d.body}</p>${d.src!=='basis'?`<span class="src">${d.src}</span>`:''}`;
  document.getElementById('drBody').scrollTop=0;
  body.classList.add('open');
}
function close(){body.classList.remove('open');cur=null;document.querySelectorAll('.chip,.pat').forEach(e=>e.classList.remove('on'));}
document.addEventListener('click',e=>{
  const t=e.target.closest('.chip,.pat');
  if(t){open(+t.dataset.id);return;}
  if(e.target.closest('#drX')||e.target.id==='scrim')close();
});
document.getElementById('drPrev').addEventListener('click',()=>{if(cur!==null)open((cur-1+FLAT.length)%FLAT.length)});
document.getElementById('drNext').addEventListener('click',()=>{if(cur!==null)open((cur+1)%FLAT.length)});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')close();
  if(cur===null)return;
  if(e.key==='ArrowRight'){e.preventDefault();open((cur+1)%FLAT.length)}
  if(e.key==='ArrowLeft'){e.preventDefault();open((cur-1+FLAT.length)%FLAT.length)}
});

/* walk */
const phases=document.querySelectorAll('.phase');
let timer=null;
document.getElementById('walk').addEventListener('click',()=>{
  if(timer){clearInterval(timer);timer=null;phases.forEach(p=>p.classList.remove('lit','past'));return;}
  close();let i=0;
  const step=()=>{
    phases.forEach((p,k)=>{p.classList.toggle('lit',k===i);p.classList.toggle('past',k<i)});
    phases[i].scrollIntoView({behavior:'smooth',block:'center'});
    i++;
    if(i>=phases.length){clearInterval(timer);timer=null;setTimeout(()=>phases.forEach(p=>p.classList.remove('lit','past')),1600);}
  };
  step();timer=setInterval(step,1400);
});
</script>
